<div class="card_grid">
    @for (card of cards; track card.id)
    {
        <div class="card">
          <a href="{{card.link}}">{{card.title}}</a>
          <p>{{card.description}}</p>
        </div>
    }
</div>
<div style="display: flex; align-items: center; justify-content: center; height: 80vh;">
  <img src="images/Bee.png" class="daibee" alt="A smiling cyborg bee" style="padding-right:10vh;"><img/>
  <p>oh god you're back hello</p>
</div>

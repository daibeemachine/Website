<div class="card_grid">
    @for (card of cards; track card.id)
    {
        <div class="card">
          <h1 class="card_title"><a href="{{card.link}}">{{card.title}}</a></h1>
          <p class="card_description">{{card.description}}</p>
        </div>
    }
</div>
<div style="display: flex; align-items: center; justify-content: center;">
  <img src="images/Bee.png" class="daibee" alt="A smiling cyborg bee"><img/>
  <p>oh god you're back hello</p>
</div>

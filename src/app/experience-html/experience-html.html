<div class="CV">
  <div class="CV__body">
    <div class="CV__bar"></div>
    <div class="body__sections">
      <h1 class="body__title">Anton Olson</h1>
      <div class="contact">
        <div class="contact__info">
          <a class="contact__info--phone" matTooltip="See PDF for phone number" tabindex="0"><fa-icon [icon]="phoneIcon"></fa-icon></a>
          <a href="mailto:daibeemachine@gmail.com" matTooltip="daibeemachine@gmail.com"><fa-icon [icon]="envelopeIcon"></fa-icon></a>
          <a href="https://www.linkedin.com/in/antonaolson/" matTooltip="antonaolson"><fa-icon [icon]="linkedinIcon"></fa-icon></a>
          <a href="https://github.com/daibeemachine" matTooltip="daibeemachine"><fa-icon [icon]="githubIcon" ></fa-icon></a>
        </div>
      </div>
      @for(section of sections; track section.id) {
      <div class="section">
        <h2>{{section.title}}</h2>
          @for(subsection of section.subsections; track subsection.id) {
          <div class="subsection">
            <h3>{{subsection.title}}</h3>
            <h4>{{subsection.date}}</h4>
            <ul >
                @for(item of subsection.items; track item.id) {
                <li class="subsection__item">{{item.info}}</li>
                }
            </ul>
          </div>
            }
      </div>
      }
        <div class="beemachine__container" tabindex="-1">
          <button (click)="squishBee()" class="beemachine__button"><img src="images/Bee.png" class="beemachine" alt="A smiling cyborg bee that spins" id="squish"><img/></button>
        </div>
    </div>

  </div>
</div>
